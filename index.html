<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sardegna Explorer" />
  <title>Sardegna Explorer</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQbsz+bBbwk4qK01D9jFyhmJ6f8xZ9U=" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>🏝️ Sardegna Explorer</h1>
      <p id="subtitle">La Caletta · Costa Est · AI personale</p>
    </div>
    <button id="installBtn" class="ghost hidden">Installa</button>
  </header>

  <main>
    <section class="panel hero">
      <div class="hero-grid">
        <div>
          <h2>Dove andiamo oggi?</h2>
          <p>Imposta vento, obiettivo e camminata: l’app ti ordina i posti migliori.</p>
        </div>
        <button id="locateBtn" class="primary">📍 Sono qui</button>
      </div>
    </section>

    <section class="panel controls">
      <div class="control">
        <label>Vento / mare</label>
        <select id="wind">
          <option>Mare calmo</option>
          <option>Maestrale leggero</option>
          <option>Maestrale forte</option>
          <option>Scirocco leggero</option>
          <option>Scirocco forte</option>
          <option>Levante forte</option>
          <option>Ponente leggero</option>
          <option>Vento forte</option>
        </select>
      </div>
      <div class="control">
        <label>Obiettivo</label>
        <select id="goal">
          <option>Snorkeling</option>
          <option>Caletta nascosta</option>
          <option>Spiaggia wow</option>
          <option>Foto/tramonto</option>
          <option>Relax poca gente</option>
          <option>Coppia</option>
          <option>Escursione/barca</option>
        </select>
      </div>
      <div class="control">
        <label>Camminata max</label>
        <input id="walkMax" type="range" min="0" max="120" step="5" value="20" />
        <span id="walkLabel">20 min</span>
      </div>
      <div class="control">
        <label>Affollamento</label>
        <select id="crowd">
          <option>Indifferente</option>
          <option selected>Tranquillo</option>
          <option>Medio</option>
          <option>Affollato</option>
        </select>
      </div>
      <div class="chips">
        <label><input id="onlySnorkel" type="checkbox" /> solo snorkeling</label>
        <label><input id="onlyLocal" type="checkbox" /> solo local/segreti</label>
        <label><input id="favoritesOnly" type="checkbox" /> preferiti</label>
        <label><input id="nearMeOnly" type="checkbox" /> vicino a me</label>
      </div>
    </section>

    <section class="panel weather">
      <div>
        <h3>🌤️ Meteo live</h3>
        <p id="weatherText">Premi “Sono qui” o apri un pin per meteo e vento.</p>
      </div>
      <button id="weatherLaCaletta" class="ghost">Meteo La Caletta</button>
    </section>

    <section class="map-wrap">
      <div id="map"></div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h3>🤖 Consigli AI</h3>
        <input id="search" placeholder="Cerca: Mariolu, polpi, Berchida..." />
      </div>
      <div id="results" class="cards"></div>
    </section>
  </main>

  <dialog id="placeDialog">
    <button id="closeDialog" class="close">×</button>
    <div id="placeDetail"></div>
  </dialog>

  <nav class="bottomnav">
    <button data-goal="Snorkeling">🤿<span>Snorkeling</span></button>
    <button data-goal="Caletta nascosta">🏝️<span>Segreti</span></button>
    <button data-goal="Spiaggia wow">🏖️<span>Wow</span></button>
    <button data-goal="Foto/tramonto">📸<span>Foto</span></button>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
